name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test + race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # The SPA is embedded via //go:embed all:dist. In CI we don't build the
      # frontend, so drop in a placeholder so the embed compiles.
      - name: Ensure embed dir
        run: |
          mkdir -p web/dist
          [ -f web/dist/index.html ] || echo '<!doctype html><title>HeroPanel</title>' > web/dist/index.html

      - name: gofmt
        run: |
          unformatted=$(gofmt -l $(git ls-files '*.go'))
          if [ -n "$unformatted" ]; then echo "::error::unformatted files:"; echo "$unformatted"; exit 1; fi

      - name: go vet
        run: go vet ./...

      - name: build (amd64 + arm64)
        run: |
          go build ./...
          GOOS=linux GOARCH=arm64 go build ./...
          GOOS=linux GOARCH=386 go build ./...

      - name: go test -race
        run: go test -race -count=1 ./...

  e2e:
    name: real OpenLiteSpeed + php-fpm + MariaDB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Build the real SPA so it is embedded via //go:embed all:dist — run-ui.sh
      # asserts hpd serves the built bundle, not a placeholder.
      - name: Build frontend
        run: |
          cd web
          npm ci
          npm test
          npm run build

      - name: Build linux binaries (amd64 + arm64)
        run: |
          for arch in amd64 arm64; do
            for b in hpd hp-broker hp-installer; do
              CGO_ENABLED=0 GOOS=linux GOARCH=$arch go build -o bin/linux-$arch/$b ./cmd/$b
            done
          done
          # A WebSocket client for the terminal e2e. It is a test tool, not a
          # shipped binary, so it lives under deploy/docker/e2e rather than cmd/.
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/linux-amd64/hp-termtest ./deploy/docker/e2e/termclient
          # A hub-protocol WebSocket probe: subscribes to a channel and prints the
          # first pushed event, so the monitor e2e can prove live delivery.
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bin/linux-amd64/wsprobe ./deploy/docker/e2e/wsprobe

      # Enable qemu so the arm64 binaries can be smoke-tested under emulation.
      - name: Set up qemu (for arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Browser-level tests, against the real hpd serving the real bundle. They
      # cover what only a browser can prove — routing, forms, keyboard handling,
      # error states. Privileged behaviour (file ops as the site user, a PTY,
      # session recording) is covered by the container e2e below, which is the
      # only place a root broker and real Linux accounts exist.
      - name: Browser e2e (Playwright)
        run: |
          cd web
          npx playwright install --with-deps chromium
          # test:e2e rebuilds the bundle and hpd itself: the suite runs a
          # prebuilt binary with the bundle embedded, so building it anywhere
          # else risks the two drifting apart and the suite testing a stale UI.
          npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report
          retention-days: 7

      - name: Build e2e image (OLS + php-fpm + MariaDB)
        run: docker build -t heropanel-e2e -f deploy/docker/e2e/Dockerfile deploy/docker/e2e

      - name: Static site served by OpenLiteSpeed + real MariaDB
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run.sh)
          echo "$out"
          grep -q 'server: LiteSpeed'   <<<"$out" || { echo '::error::OpenLiteSpeed did not respond'; exit 1; }
          grep -q 'Hello from HeroPanel' <<<"$out" || { echo '::error::static page was not served'; exit 1; }
          grep -q 'acme_db'             <<<"$out" || { echo '::error::MariaDB db.create failed'; exit 1; }

      - name: PHP site served by OpenLiteSpeed + php-fpm
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-php.sh)
          echo "$out"
          grep -q 'live via HeroPanel'  <<<"$out" || { echo '::error::PHP page was not served'; exit 1; }

      - name: Git deploy (clone + build + atomic swap + rollback) served by OpenLiteSpeed
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-git.sh)
          echo "$out"
          grep -q 'v1 via HeroPanel Git'              <<<"$out" || { echo '::error::git deploy was not served'; exit 1; }
          grep -q 'after deploy #2: <h1>v2'           <<<"$out" || { echo '::error::second deploy did not swap'; exit 1; }
          grep -q 'after rollback:  <h1>v1'           <<<"$out" || { echo '::error::rollback did not revert the release'; exit 1; }
          grep -q '"capability":"git.rollback","outcome":"success"' <<<"$out" || { echo '::error::git.rollback did not succeed'; exit 1; }

      - name: Private Git repo over SSH (panel-generated deploy key, real sshd)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-git-private.sh)
          echo "$out"
          grep -q 'private key absent from API response: OK'  <<<"$out" || { echo '::error::the private key leaked into the API response'; exit 1; }
          grep -q 'private key sealed at rest'                <<<"$out" || { echo '::error::the deploy key was stored in the clear'; exit 1; }
          grep -q 'priv.test -> 200 <h1>private repo via HeroPanel</h1>' <<<"$out" || { echo '::error::the private repo was not deployed'; exit 1; }
          grep -q 'no credential material left on /run: OK'   <<<"$out" || { echo '::error::credential material survived the deploy'; exit 1; }
          grep -q '"capability":"git.deploy","outcome":"success"' <<<"$out" || { echo '::error::git.deploy did not succeed'; exit 1; }
          grep -q 'wrong pin rejected: OK'   <<<"$out" || { echo '::error::a wrong pinned host key was not rejected under strict checking'; exit 1; }
          grep -q 'correct pin deploy: success' <<<"$out" || { echo '::error::a correctly pinned host key did not allow the deploy'; exit 1; }

      - name: Token/HTTPS clone against a real HTTPS git server (private-CA TLS)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-git-token.sh)
          echo "$out"
          grep -q 'run-git-token.sh : PASS' <<<"$out" || { echo '::error::the token/HTTPS clone path failed'; exit 1; }

      - name: Laravel-shaped app (private repo + Composer + MariaDB) and the database suite
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-php-app.sh)
          echo "$out"
          grep -q 'composer dependency: loaded'  <<<"$out" || { echo '::error::Composer did not install the dependency'; exit 1; }
          grep -q 'db row: hello from mariadb'   <<<"$out" || { echo '::error::the app could not reach the panel-created database'; exit 1; }
          grep -q 'dependency present on disk: OK' <<<"$out" || { echo '::error::vendor/ was not produced'; exit 1; }
          grep -q 'dump is gzip: OK'             <<<"$out" || { echo '::error::the export was not a gzip'; exit 1; }
          grep -q 'server-side dump cleaned up: OK' <<<"$out" || { echo '::error::the export was left on the server'; exit 1; }
          grep -q 'restored title:    hello from mariadb' <<<"$out" || { echo '::error::the import did not restore the data'; exit 1; }
          grep -q 'grants after revoke: 0'       <<<"$out" || { echo '::error::revoke did not remove the grant'; exit 1; }
          grep -q '"capability":"db.export","outcome":"success"' <<<"$out" || { echo '::error::db.export did not succeed'; exit 1; }
          grep -q '"capability":"db.import","outcome":"success"' <<<"$out" || { echo '::error::db.import did not succeed'; exit 1; }
          grep -q '"capability":"db.revoke","outcome":"success"' <<<"$out" || { echo '::error::db.revoke did not succeed'; exit 1; }

      - name: PHP tuning — sizing / php.ini editor / OPcache / extensions on real php-fpm
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-php-tuning.sh)
          echo "$out"
          # The php.ini editor and OPcache toggle, observed in a served phpinfo.
          grep -q 'ok   php.ini override is live'  <<<"$out" || { echo '::error::php.ini override did not take effect'; exit 1; }
          grep -q 'ok   memory_limit is live'      <<<"$out" || { echo '::error::memory_limit did not take effect'; exit 1; }
          grep -q 'ok   OPcache turned off is live' <<<"$out" || { echo '::error::OPcache toggle did not take effect'; exit 1; }
          # Two independent guards against a pool that would down every site on
          # the version: hpd validation, and php-fpm -t before the reload.
          grep -q 'ok   invalid sizing refused by the API'       <<<"$out" || { echo '::error::invalid FPM sizing was not rejected'; exit 1; }
          grep -q 'ok   site still serving the last good config' <<<"$out" || { echo '::error::a rejected change disrupted the running site'; exit 1; }
          # The pool file is where a site is confined; a value must not escape it.
          grep -q 'ok   newline-injection refused' <<<"$out" || { echo '::error::a php.ini value could break out of its directive'; exit 1; }
          grep -q 'ok   open_basedir not settable' <<<"$out" || { echo '::error::a confinement directive was settable'; exit 1; }
          # The extension manager, proven by a real FPM restart + served phpinfo.
          grep -q 'ok   disabling an extension is live in a served phpinfo' <<<"$out" || { echo '::error::disabling an extension had no effect'; exit 1; }
          grep -q 'ok   re-enabling an extension is live' <<<"$out" || { echo '::error::re-enabling an extension had no effect'; exit 1; }
          grep -q 'run-php-tuning.sh : PASS' <<<"$out" || { echo '::error::run-php-tuning.sh failed'; exit 1; }

      - name: Site lifecycle — suspend / resume / clone / logs on real OpenLiteSpeed
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-lifecycle.sh)
          echo "$out"
          # Suspension is a claim about real OLS routing: a suspended site keeps
          # its vhost so its domains cannot fall through to the first vhost —
          # i.e. to another customer's site.
          grep -q 'ok   suspended site returns 503' <<<"$out" || { echo '::error::a suspended site did not 503'; exit 1; }
          grep -q 'ok   suspended domain did NOT fall through to the other site' <<<"$out" || { echo '::error::a suspended domain was served by another site'; exit 1; }
          grep -q 'ok   the other site is untouched'  <<<"$out" || { echo '::error::suspending one site broke another'; exit 1; }
          grep -q 'ok   resumed site serves again'    <<<"$out" || { echo '::error::resume did not restore the site'; exit 1; }
          # Logs: 0750 and owned by the site user, so only the broker can read them.
          grep -q 'ok   access log is readable through the broker' <<<"$out" || { echo '::error::site logs could not be read'; exit 1; }
          grep -q 'ok   an unknown log kind is refused' <<<"$out" || { echo '::error::the log kind allowlist did not hold'; exit 1; }
          # Clone: a separate site, and its files must belong to *its* user.
          grep -q 'ok   clone content was copied' <<<"$out" || { echo '::error::the clone has no content'; exit 1; }
          grep -q "ok   cloned content is owned by the clone's user, not the source's" <<<"$out" || { echo '::error::the clone shares the source user — the sites are not isolated'; exit 1; }
          grep -q 'ok   source site still serves' <<<"$out" || { echo '::error::cloning broke the source site'; exit 1; }
          grep -q 'run-lifecycle.sh : PASS' <<<"$out" || { echo '::error::run-lifecycle.sh failed'; exit 1; }

      - name: Embedded SPA served + every UI page has a live endpoint
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-ui.sh)
          echo "$out"
          grep -q 'ok   it is the built bundle'          <<<"$out" || { echo '::error::the built SPA is not embedded in hpd'; exit 1; }
          grep -q 'ok   deep links fall through to the SPA' <<<"$out" || { echo '::error::client-side routing deep links 404'; exit 1; }
          grep -q 'ok   capabilities returned'            <<<"$out" || { echo '::error::the capability set endpoint is missing'; exit 1; }
          grep -q 'ok   modules show running'             <<<"$out" || { echo '::error::in-core modules did not register'; exit 1; }
          grep -q 'ok   php tab'                          <<<"$out" || { echo '::error::a site-detail facet has no endpoint'; exit 1; }
          grep -q 'run-ui.sh : PASS'                      <<<"$out" || { echo '::error::run-ui.sh failed'; exit 1; }

      - name: File Manager on a real site (run-as-user + path confinement + baremetal gate)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-files.sh)
          echo "$out"
          # Invariant 1: a file written through the API is owned by the site's uid,
          # not root — the whole point of running every op as the site user.
          grep -q 'write ran as the site user' <<<"$out" || { echo '::error::a file op did not run as the site user'; exit 1; }
          # Content round-trips, including binary (base64 over the wire).
          grep -q 'download matches what was written' <<<"$out" || { echo '::error::file read/download did not round-trip'; exit 1; }
          grep -q 'binary content survived the round-trip' <<<"$out" || { echo '::error::binary content was corrupted'; exit 1; }
          grep -q 'archive extracted' <<<"$out" || { echo '::error::archive extraction failed'; exit 1; }
          # Compress: the archive must hold relative paths and round-trip back.
          grep -q 'archive holds relative paths' <<<"$out" || { echo '::error::the created archive embedded absolute server paths'; exit 1; }
          grep -q 'compress -> extract round-trips' <<<"$out" || { echo '::error::compress/extract did not round-trip'; exit 1; }
          # Search, including that it cannot be pointed outside the site.
          grep -q 'name search found the file' <<<"$out" || { echo '::error::recursive name search failed'; exit 1; }
          grep -q 'content search found the file' <<<"$out" || { echo '::error::recursive content search failed'; exit 1; }
          grep -q 'a traversing search path cannot list /etc' <<<"$out" || { echo '::error::search escaped the site root'; exit 1; }
          # Copy/move: the paste half of copy-cut-paste. Both ends are confined,
          # and neither may silently clobber what is already there.
          grep -q 'copy ran as the site user' <<<"$out" || { echo '::error::copy did not run as the site user'; exit 1; }
          grep -q 'copy refuses to overwrite by default' <<<"$out" || { echo '::error::copy overwrote an existing destination'; exit 1; }
          grep -q 'on_conflict=rename landed beside the original' <<<"$out" || { echo '::error::duplicate did not pick a free name'; exit 1; }
          grep -q 'move relocated the file' <<<"$out" || { echo '::error::move did not relocate the file'; exit 1; }
          grep -q 'a traversing copy destination was clamped' <<<"$out" || { echo '::error::copy escaped the site root'; exit 1; }
          # Folder download exists so nothing is left behind; that is the assertion.
          grep -q 'the folder downloaded as a valid zip' <<<"$out" || { echo '::error::folder download did not produce a valid zip'; exit 1; }
          grep -q 'no temporary archive was left in the site tree' <<<"$out" || { echo '::error::folder download leaked a temp archive'; exit 1; }
          # chown is the one root-run file op; it must only ever target the site user.
          grep -q 'ownership repaired to the site user' <<<"$out" || { echo '::error::ownership repair failed'; exit 1; }
          # Invariant 2: a traversal never touches the real /etc/passwd and is
          # clamped back under the site root.
          grep -q 'the real /etc/passwd was NOT modified' <<<"$out" || { echo '::error::path traversal escaped the site root'; exit 1; }
          grep -q 'traversal was clamped to <site-root>' <<<"$out" || { echo '::error::the traversal clamp did not land under the site root'; exit 1; }
          # The File Manager is baremetal-only.
          grep -q 'git site is refused (not_baremetal)' <<<"$out" || { echo '::error::a git site was not refused file ops'; exit 1; }
          grep -q 'run-files.sh : PASS' <<<"$out" || { echo '::error::run-files.sh failed'; exit 1; }

      - name: Web terminal (PTY as the site user, audited, confined)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-terminal.sh)
          echo "$out"
          # The invariant: the shell is the site's Linux account, never root.
          grep -q 'the PTY reported the site user' <<<"$out" || { echo '::error::the terminal did not run as the site user'; exit 1; }
          grep -q 'the shell executed input and returned its output' <<<"$out" || { echo '::error::terminal I/O did not round-trip'; exit 1; }
          grep -q 'pwd is the site home' <<<"$out" || { echo '::error::the session did not start in the site home'; exit 1; }
          # A traversing cwd must never land the operator in the real /etc.
          grep -q 'clamped under the site root' <<<"$out" || { echo '::error::the terminal start directory escaped the site root'; exit 1; }
          # An unauthenticated upgrade must be refused, and sessions must be audited.
          grep -q 'no session cookie -> upgrade refused' <<<"$out" || { echo '::error::an unauthenticated client got a terminal'; exit 1; }
          grep -q 'terminal.open recorded as success' <<<"$out" || { echo '::error::the terminal session was not audited'; exit 1; }
          grep -q 'no orphaned shell left behind' <<<"$out" || { echo '::error::a shell survived the disconnect'; exit 1; }
          # Session recording. The first of these is the one that matters: if a
          # typed password ever reaches the transcript, the panel has become a
          # plaintext password store.
          grep -q 'the typed password is NOT in the recording' <<<"$out" || { echo '::error::A TYPED PASSWORD WAS STORED IN A SESSION RECORDING'; exit 1; }
          grep -q 'the redaction marker is present' <<<"$out" || { echo '::error::redaction dropped input silently instead of marking it'; exit 1; }
          grep -q 'normal input either side of the prompt was still recorded' <<<"$out" || { echo '::error::redaction swallowed ordinary input'; exit 1; }
          grep -q 'valid asciicast v2' <<<"$out" || { echo '::error::the recording is not a readable asciicast'; exit 1; }
          grep -q 'the downloaded transcript also holds no password' <<<"$out" || { echo '::error::the password came back through the API'; exit 1; }
          grep -q 'run-terminal.sh : PASS' <<<"$out" || { echo '::error::run-terminal.sh failed'; exit 1; }

      # Docker module, against the runner's own daemon. The socket is mounted in,
      # which is root-equivalent for that container — acceptable for a throwaway
      # CI runner and the only way to test against a real dockerd, but stated
      # plainly rather than left as an unexplained flag.
      - name: Docker module (ownership boundary against a real daemon)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" -v /var/run/docker.sock:/var/run/docker.sock heropanel-e2e bash /e2e/run-docker.sh)
          echo "$out"
          # THE invariant: the panel must never touch a container it did not
          # create. Without it, a stop button is a remote off-switch for every
          # container on the host.
          grep -q 'the unmanaged container is STILL RUNNING after four refused operations' <<<"$out" || { echo '::error::THE PANEL MODIFIED A CONTAINER IT DOES NOT MANAGE'; exit 1; }
          grep -q 'the foreign container is flagged unmanaged' <<<"$out" || { echo '::error::a foreign container was reported as panel-managed'; exit 1; }
          # ...but it must still be visible, or the panel lies about the host.
          grep -q 'a container the panel did not create is still listed' <<<"$out" || { echo '::error::unmanaged containers were hidden from the listing'; exit 1; }
          grep -q "the panel's container is flagged managed" <<<"$out" || { echo '::error::the panel did not recognise its own container'; exit 1; }
          # A working lifecycle action must not report as a failure because the
          # stop grace ate the HTTP write budget.
          grep -q 'lifecycle calls answer inside the HTTP write budget' <<<"$out" || { echo '::error::a lifecycle call exceeded the request budget'; exit 1; }
          grep -q 'a flag-shaped container name is refused' <<<"$out" || { echo '::error::a value that docker parses as a flag was accepted'; exit 1; }
          grep -q 'docker.container.stop recorded by the broker' <<<"$out" || { echo '::error::a privileged docker action was not audited'; exit 1; }
          # Container creation and its hardening: no host bind mounts, loopback-only.
          grep -q 'the container has no host bind mounts' <<<"$out" || { echo '::error::a created container had a host bind mount'; exit 1; }
          grep -q 'the published port is bound to loopback only' <<<"$out" || { echo '::error::a created container published on all interfaces'; exit 1; }
          grep -q 'no container was created by any of the escape attempts' <<<"$out" || { echo '::error::a host-path volume was accepted through the API'; exit 1; }
          grep -q 'the environment value is not in the broker log' <<<"$out" || { echo '::error::a container env secret leaked to the broker log'; exit 1; }
          # A shell inside a container obeys the ownership boundary.
          grep -q 'a shell in an unmanaged container is refused with 403' <<<"$out" || { echo '::error::a shell was opened in a container the panel does not manage'; exit 1; }
          # One-click apps: the phase exit criteria (deploy, run, tear down cleanly).
          grep -q 'an app was deployed' <<<"$out" || { echo '::error::a one-click app failed to deploy'; exit 1; }
          grep -q 'the app is published to loopback only' <<<"$out" || { echo '::error::a deployed app published on all interfaces'; exit 1; }
          grep -q 'no app container remains after tear-down' <<<"$out" || { echo '::error::an app was not torn down cleanly'; exit 1; }
          grep -q 'the generated secret is not in the broker log' <<<"$out" || { echo '::error::A GENERATED APP SECRET LEAKED TO THE BROKER LOG'; exit 1; }
          # Image management: docker's in-use refusal is the ownership boundary for
          # images, and prune must not touch an image a container still needs.
          grep -q 'an in-use image is refused removal' <<<"$out" || { echo '::error::an in-use image was removed out from under a container'; exit 1; }
          grep -q 'prune kept the image a container still uses' <<<"$out" || { echo '::error::prune removed an image still in use'; exit 1; }
          # Volumes/networks first-class: inspect reports consumers, and reads are
          # not ownership-gated.
          grep -q 'volume inspect lists the container that mounts it' <<<"$out" || { echo '::error::volume inspect did not report its consumers'; exit 1; }
          grep -q 'an unmanaged network can be inspected' <<<"$out" || { echo '::error::inspecting an unmanaged object was gated like a mutation'; exit 1; }
          # Live log streaming: the follow upgrades and lands on the audit chain.
          grep -q 'a live log follow upgrades to a WebSocket' <<<"$out" || { echo '::error::a live log follow did not upgrade'; exit 1; }
          grep -q 'the log follow is on the broker.s audit chain' <<<"$out" || { echo '::error::a live log follow was not audited'; exit 1; }
          # Reverse-proxy auto-wiring: exposing an app stands up a linked proxy site,
          # and unexpose removes the front door without stopping the app.
          grep -q 'exposing an app creates a proxy site' <<<"$out" || { echo '::error::exposing an app did not create a proxy site'; exit 1; }
          grep -q 'the proxy site is linked to the app it fronts' <<<"$out" || { echo '::error::the exposed app is not linked to its proxy site'; exit 1; }
          grep -q 'unexpose removes the proxy site' <<<"$out" || { echo '::error::unexpose did not remove the proxy site'; exit 1; }
          grep -q 'the app keeps running after unexpose' <<<"$out" || { echo '::error::unexpose stopped the app instead of just its front door'; exit 1; }
          grep -q 'run-docker.sh : PASS' <<<"$out" || { echo '::error::run-docker.sh failed'; exit 1; }

      - name: Monitoring — live node metrics pushed over the realtime hub
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-monitor.sh)
          echo "$out"
          # The hub must run without Redis (local push needs none), so a Redis-less
          # install still gets live dashboards.
          grep -q 'the realtime hub is up without Redis' <<<"$out" || { echo '::error::the realtime hub did not start without Redis'; exit 1; }
          grep -q 'memory, load and the root filesystem are reported' <<<"$out" || { echo '::error::the node sample was missing or nonsensical'; exit 1; }
          grep -q 'an unauthenticated node read is refused' <<<"$out" || { echo '::error::node metrics were readable without auth'; exit 1; }
          # The exit criterion: a subscriber receives a pushed sample — the server
          # sampled only because someone subscribed (subscription-gated).
          grep -q 'a live node sample was pushed to a subscriber' <<<"$out" || { echo '::error::no live metric was pushed over the hub'; exit 1; }
          # M2: service health through the broker, and its own gated live push.
          grep -q 'service health reports a state for each service' <<<"$out" || { echo '::error::service health did not report states'; exit 1; }
          grep -q 'service.status ran through the broker' <<<"$out" || { echo '::error::service status bypassed the broker'; exit 1; }
          grep -q 'the per-site metrics endpoint responds' <<<"$out" || { echo '::error::the per-site metrics endpoint did not respond'; exit 1; }
          grep -q 'live service health was pushed to a subscriber' <<<"$out" || { echo '::error::service health was not pushed live'; exit 1; }
          # M3: the history endpoint responds (persist/rollup logic is unit-tested).
          grep -q 'the history endpoint responds with the points envelope' <<<"$out" || { echo '::error::the metric history endpoint did not respond'; exit 1; }
          # M4: a breaching rule fires its webhook and records an event, and the
          # notification target is never returned by the API.
          grep -q 'the notification target is write-only' <<<"$out" || { echo '::error::an alert notification target leaked in the API'; exit 1; }
          grep -q 'the breach fired a webhook to the receiver' <<<"$out" || { echo '::error::an alert breach did not fire its webhook'; exit 1; }
          grep -q 'the firing was recorded as an alert event' <<<"$out" || { echo '::error::an alert firing was not recorded'; exit 1; }
          grep -q 'run-monitor.sh : PASS' <<<"$out" || { echo '::error::run-monitor.sh failed'; exit 1; }

      - name: Scheduler — cron jobs as systemd timers, running as the site user
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-cron.sh)
          echo "$out"
          grep -q 'the timer and service units exist on disk' <<<"$out" || { echo '::error::cron units were not written'; exit 1; }
          grep -q 'the service runs as the site user, oneshot' <<<"$out" || { echo '::error::the cron service is not hardened as the site user'; exit 1; }
          # THE invariant: a scheduled command executes as the unprivileged site
          # user, never root — observed from the job's own output.
          grep -q 'THE JOB RAN AS THE SITE USER' <<<"$out" || { echo '::error::A CRON JOB DID NOT RUN AS THE SITE USER'; exit 1; }
          grep -q 'a shell-shaped schedule is refused' <<<"$out" || { echo '::error::a shell-injection schedule was accepted'; exit 1; }
          grep -q 'the timer unit is gone after disable' <<<"$out" || { echo '::error::disable did not remove the timer'; exit 1; }
          grep -q 'run-cron.sh : PASS' <<<"$out" || { echo '::error::run-cron.sh failed'; exit 1; }

      - name: Backups — encrypted full+incremental, restored into a new site
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-backup.sh)
          echo "$out"
          # THE invariants: what sits at rest is ciphertext, and the chain
          # actually reproduces the site — in a NEW site, owned by its user.
          grep -q 'the at-rest archive is unreadable as tar' <<<"$out" || { echo '::error::A BACKUP WAS STORED UNENCRYPTED'; exit 1; }
          grep -q 'no plaintext staging archive remains' <<<"$out" || { echo '::error::a plaintext staging archive outlived the call'; exit 1; }
          grep -q 'the incremental is smaller than the full' <<<"$out" || { echo '::error::the incremental was not incremental'; exit 1; }
          grep -q 'the edited file restored with its LATEST content' <<<"$out" || { echo '::error::the incremental chain did not replay'; exit 1; }
          grep -q "restored files belong to the NEW site's user" <<<"$out" || { echo '::error::restored files kept the wrong owner'; exit 1; }
          grep -q 'the original site is untouched' <<<"$out" || { echo '::error::the restore modified the original site'; exit 1; }
          grep -q 'deleting the full also removed the incremental' <<<"$out" || { echo '::error::a broken chain was left behind'; exit 1; }
          # The once-deferred legs, live: a real MinIO bucket, a real MariaDB
          # dump round-trip into a NEW database, and the panel's own snapshot
          # opened offline with hpd decrypt.
          grep -q 'the sealed archive is IN the bucket' <<<"$out" || { echo '::error::the s3 backup never reached the live bucket'; exit 1; }
          grep -q 'RESTORED FROM THE BUCKET' <<<"$out" || { echo '::error::the s3 restore did not come from the bucket'; exit 1; }
          grep -q 'THE ROW CAME BACK IN A NEW DATABASE' <<<"$out" || { echo '::error::the database dump did not restore'; exit 1; }
          grep -q 'the original database is untouched' <<<"$out" || { echo '::error::the db restore modified the original database'; exit 1; }
          grep -q "THE SNAPSHOT HOLDS THE PANEL'S OWN DATA" <<<"$out" || { echo '::error::the panel self-backup is not a usable snapshot'; exit 1; }
          grep -q 'a wrong key is refused' <<<"$out" || { echo '::error::hpd decrypt accepted a wrong key'; exit 1; }
          grep -q 'run-backup.sh : PASS' <<<"$out" || { echo '::error::run-backup.sh failed'; exit 1; }

      - name: Audit chain on real MariaDB (hpd's own store, not SQLite)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-audit.sh)
          echo "$out"
          # The only suite that runs hpd's control-plane store on MariaDB, so it
          # is also the only thing exercising the mysql migrations at all.
          grep -q 'ok   all 25 mysql migrations applied' <<<"$out" || { echo '::error::the mysql migrations did not apply'; exit 1; }
          # The chain must verify against the engine that ships, not just SQLite:
          # MariaDB pads DATETIME(6) to six digits and the hash covers the stored bytes.
          grep -q 'ok   chain intact on MariaDB'   <<<"$out" || { echo '::error::the audit chain does not verify on MariaDB'; exit 1; }
          grep -q 'ok   six fractional digits'     <<<"$out" || { echo '::error::created_at did not round-trip as DATETIME(6)'; exit 1; }
          grep -q 'ok   tampering detected'        <<<"$out" || { echo '::error::a row edited in SQL was not detected'; exit 1; }
          # Coverage: mutations in, reads out, disclosure-heavy reads back in.
          grep -q 'ok   database create recorded'  <<<"$out" || { echo '::error::a mutation was not audited'; exit 1; }
          grep -q 'ok   denied attempt recorded'   <<<"$out" || { echo '::error::a refused request was not audited'; exit 1; }
          grep -q 'ok   plain GET added no row'    <<<"$out" || { echo '::error::reads are being audited'; exit 1; }
          grep -q 'ok   export forced a row'       <<<"$out" || { echo '::error::the export was not audited'; exit 1; }
          # Secrets must never reach a table that is meant to be exported.
          grep -q 'ok   password never recorded'   <<<"$out" || { echo '::error::a password reached the audit log'; exit 1; }
          grep -q 'run-audit.sh : PASS'            <<<"$out" || { echo '::error::run-audit.sh failed'; exit 1; }

      - name: FastAPI app via Git — auto-deploy (webhook) + rollback + cgroup slice
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-fastapi.sh)
          echo "$out"
          # The python runtime, on a real venv built from a real requirements.txt.
          grep -q 'uvicorn installed in the release venv: OK' <<<"$out" || { echo '::error::the venv build did not produce uvicorn'; exit 1; }
          grep -q 'api.test -> {"app":"fastapi","version":"v1"}' <<<"$out"   || { echo '::error::FastAPI was not reverse-proxied'; exit 1; }
          # Auto-deploy: git push + the webhook, no panel session.
          grep -q 'after webhook  -> {"app":"fastapi","version":"v2"}' <<<"$out" || { echo '::error::the webhook did not auto-deploy the push'; exit 1; }
          grep -q '"trigger":"webhook"' <<<"$out"                          || { echo '::error::no webhook-triggered deployment was recorded'; exit 1; }
          grep -q 'signed valid signature: OK'    <<<"$out" || { echo '::error::a valid GitHub HMAC signature was not accepted'; exit 1; }
          grep -q 'tampered signature denied: OK'  <<<"$out" || { echo '::error::a tampered webhook signature was not rejected'; exit 1; }
          grep -q 'audit proof kinds:.*github_signature' <<<"$out" || { echo '::error::the webhook proof kind was not audited'; exit 1; }
          # Rollback has to actually restart the app, or the bad release keeps serving.
          grep -q 'after rollback -> {"app":"fastapi","version":"v1"}' <<<"$out" || { echo '::error::rollback did not put the old release back in service'; exit 1; }
          # The app must run inside its site slice, and limits must reach it.
          grep -q 'Slice=heropanel-site-hps1.slice' <<<"$out"              || { echo '::error::the app unit is not in its site slice'; exit 1; }
          grep -q 'CPUQuota=50%'                    <<<"$out"              || { echo '::error::the site slice did not get its CPU limit'; exit 1; }
          grep -q 'MemoryMax=536870912'             <<<"$out"              || { echo '::error::the site slice did not get its memory limit'; exit 1; }

      - name: Next.js app via Git (async job path — a real build cannot finish inside a request)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-nextjs.sh)
          echo "$out"
          grep -q 'job queue enabled'              <<<"$out" || { echo '::error::the queue was not enabled'; exit 1; }
          grep -q 'next build output present: OK'  <<<"$out" || { echo '::error::next build did not produce .next'; exit 1; }
          grep -q 'Next.js live via HeroPanel'     <<<"$out" || { echo '::error::the Next.js app was not served'; exit 1; }
          grep -qi 'x-powered-by: Next.js'         <<<"$out" || { echo '::error::next start is not serving'; exit 1; }

      - name: Go app via Git (compiled as the unprivileged site user)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-go.sh)
          echo "$out"
          grep -q 'compiled binary present: OK'          <<<"$out" || { echo '::error::go build did not produce a binary'; exit 1; }
          grep -q 'binary is owned by the site user: hps1' <<<"$out" || { echo '::error::the binary is not owned by the site user'; exit 1; }
          grep -q 'Go app live via HeroPanel pid'        <<<"$out" || { echo '::error::the Go app was not reverse-proxied'; exit 1; }

      - name: App runtime (git-deployed Node app reverse-proxied by OpenLiteSpeed)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-app.sh)
          echo "$out"
          grep -q 'HeroPanel app live on port 3000'    <<<"$out" || { echo '::error::app was not reverse-proxied'; exit 1; }
          grep -q '"capability":"app.unit_apply","outcome":"success"' <<<"$out" || { echo '::error::app.unit_apply did not succeed'; exit 1; }
          grep -q '"healthy":true'                     <<<"$out" || { echo '::error::the health probe did not pass for a live app'; exit 1; }
          # systemd "started" is not "working": a crashing app must report error.
          grep -q '"status":"error"'                   <<<"$out" || { echo '::error::a crashing app was not reported as unhealthy'; exit 1; }

      - name: Authoritative DNS (BIND9 serves zones/records created via the API)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-dns.sh)
          echo "$out"
          grep -q 'www.example.test A  = 203.0.113.20' <<<"$out" || { echo '::error::DNS record not resolved by dig'; exit 1; }
          grep -q '"capability":"dns.write_zone","outcome":"success"' <<<"$out" || { echo '::error::dns.write_zone did not succeed'; exit 1; }

      - name: Domains (alias serves, redirect 301s, force-HTTPS 301s)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-domains.sh)
          echo "$out"
          grep -q 'www.acme.test      -> 200 <h1>Hello from HeroPanel</h1>' <<<"$out" || { echo '::error::alias did not serve the site'; exit 1; }
          grep -q 'old.acme.test      -> 301 Location: https://acme.test/'  <<<"$out" || { echo '::error::redirect domain did not 301'; exit 1; }
          grep -q 'acme.test (force)  -> 301 Location: https://acme.test/'  <<<"$out" || { echo '::error::force-HTTPS did not redirect'; exit 1; }
          grep -q 'acme.test (off)    -> 200'                               <<<"$out" || { echo '::error::force-HTTPS off did not serve'; exit 1; }
          grep -q 'alias dropped from map: OK'                              <<<"$out" || { echo '::error::deleted alias still mapped'; exit 1; }

      # The installer runs on a *fresh* distro image (not heropanel-e2e) so it
      # proves cross-distro package management. Once on apt (Ubuntu), once on dnf
      # (Rocky): each does a real execute → resume → rollback and confirms the
      # panel comes up.
      - name: Real ACME HTTP-01 issuance against Pebble (a live test CA)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" heropanel-e2e bash /e2e/run-acme.sh)
          echo "$out"
          grep -q 'run-acme.sh : PASS' <<<"$out" || { echo '::error::real ACME issuance against Pebble failed'; exit 1; }

      - name: Installer execute/resume/rollback on Ubuntu (apt)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" ubuntu:24.04 bash /e2e/run-installer.sh)
          echo "$out"
          grep -q 'run-installer.sh : PASS' <<<"$out" || { echo '::error::installer failed on Ubuntu'; exit 1; }

      - name: Installer execute/resume/rollback on Rocky (dnf)
        run: |
          out=$(docker run --rm -v "$PWD/bin/linux-amd64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" rockylinux:9 bash /e2e/run-installer.sh)
          echo "$out"
          grep -q 'run-installer.sh : PASS' <<<"$out" || { echo '::error::installer failed on Rocky'; exit 1; }

      # arm64 is a first-class target: prove the cross-compiled binaries run on
      # aarch64 (arch detection, the SQLite driver + every migration, the broker
      # self-check) under qemu, on both distro families. A full emulated apt/dnf
      # install would mostly re-test the emulator; the install logic itself is
      # arch-agnostic and already proven on amd64 above.
      - name: arm64 smoke on Ubuntu + Rocky (qemu)
        run: |
          for img in ubuntu:24.04 rockylinux:9; do
            echo "=== arm64 smoke on $img ==="
            out=$(docker run --rm --platform linux/arm64 -v "$PWD/bin/linux-arm64:/hp:ro" -v "$PWD/deploy/docker/e2e:/e2e:ro" "$img" bash /e2e/run-arch-smoke.sh)
            echo "$out"
            grep -q 'run-arch-smoke.sh : PASS' <<<"$out" || { echo "::error::arm64 smoke failed on $img"; exit 1; }
          done
